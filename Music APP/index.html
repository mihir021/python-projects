<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Pulse">
  <meta name="description" content="Personal Music Player PWA - premium, offline-ready, and iPhone optimized.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="assets/icons/icon-120.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="assets/css/style.css">
  <title>Pulse Player</title>
</head>
<body>
  <div id="app" class="app-container">
    <div class="top-spacer"></div>

    <main id="main-view" class="main-view" aria-live="polite">
      <section class="view" data-view="home"></section>
      <section class="view" data-view="search"></section>
      <section class="view" data-view="library"></section>
      <section class="view" data-view="favorites"></section>
      <section class="view" data-view="playlists"></section>
    </main>

    <div id="mini-player" class="mini-player" aria-label="Now playing">
      <div class="mini-art-wrap">
        <img id="mini-cover" src="assets/icons/icon-192.png" alt="Album art" class="mini-cover">
      </div>
      <div class="mini-info">
        <span id="mini-title" class="mini-title">Not Playing</span>
        <span id="mini-artist" class="mini-artist">Select a song</span>
      </div>
      <button id="mini-fav" class="icon-btn" aria-label="Like song">
        <svg viewBox="0 0 24 24" aria-hidden="true" class="heart-icon"><path d="M12 20.5s-7.5-4.35-9.5-8.94C.71 8.1 2.68 5 5.92 5c2 0 3.23 1.08 4.08 2.25C10.85 6.08 12.08 5 14.08 5c3.24 0 5.21 3.1 3.42 6.56C19.5 16.15 12 20.5 12 20.5z"/></svg>
      </button>
      <button id="mini-play" class="icon-btn play" aria-label="Play or pause">
        <svg viewBox="0 0 24 24" aria-hidden="true" class="play-icon"><path d="M8 5.2v13.6a.8.8 0 0 0 1.2.7l10.4-6.8a.8.8 0 0 0 0-1.4L9.2 4.5a.8.8 0 0 0-1.2.7z"/></svg>
      </button>
    </div>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-btn active" data-view="home" aria-label="Home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.5 12 4l8 7.5v7a1.5 1.5 0 0 1-1.5 1.5H5.5A1.5 1.5 0 0 1 4 18.5v-7z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-view="library" aria-label="Library">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v13.5a1.5 1.5 0 0 1-1.5 1.5H7.5A1.5 1.5 0 0 1 6 17.5V4a1 1 0 0 1 1-1zm0 4h12M6 11h12"/></svg>
        <span>Library</span>
      </button>
      <button class="nav-btn" data-view="favorites" aria-label="Favorites">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.5s-7.5-4.35-9.5-8.94C.71 8.1 2.68 5 5.92 5c2 0 3.23 1.08 4.08 2.25C10.85 6.08 12.08 5 14.08 5c3.24 0 5.21 3.1 3.42 6.56C19.5 16.15 12 20.5 12 20.5z"/></svg>
        <span>Favorites</span>
      </button>
      <button class="nav-btn" data-view="playlists" aria-label="Playlists">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zm15 2h2v10h-2V8zm0-3h2v2h-2V5z"/></svg>
        <span>Playlists</span>
      </button>
    </nav>

    <div id="now-playing-modal" class="now-playing-modal hidden" aria-hidden="true">
      <div id="np-blur" class="np-blur"></div>
      <div class="np-overlay"></div>
      <div class="np-content">
        <div class="np-handle"></div>
        <div class="np-header">
          <button id="np-back" class="icon-btn close" aria-label="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
          </button>
          <div class="np-header-info">
            <img id="np-cover" src="assets/icons/icon-192.png" alt="Album art" class="np-cover-small">
            <div class="np-info">
              <h2 id="np-title">Not Playing</h2>
              <p id="np-artist">Select a song to start</p>
            </div>
          </div>
          <div class="np-actions">
            <button id="np-star" class="icon-btn" aria-label="Rate">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l2.9 6 6.6.6-5 4.3 1.6 6.5-6.1-3.4-6.1 3.4 1.6-6.5-5-4.3 6.6-.6z"/></svg>
            </button>
            <button id="np-more" class="icon-btn" aria-label="More">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 10h2v4H5v-4zm6 0h2v4h-2v-4zm6 0h2v4h-2v-4z"/></svg>
            </button>
          </div>
        </div>
        <div class="np-controls">
          <button id="np-prev" class="icon-btn" aria-label="Previous">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h2v14H7zM11 12l8 7V5z"/></svg>
          </button>
          <button id="np-play" class="icon-btn play" aria-label="Play or pause">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="play-icon"><path d="M8 5.2v13.6a.8.8 0 0 0 1.2.7l10.4-6.8a.8.8 0 0 0 0-1.4L9.2 4.5a.8.8 0 0 0-1.2.7z"/></svg>
          </button>
          <button id="np-next" class="icon-btn" aria-label="Next">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5h2v14h-2zM13 12L5 5v14z"/></svg>
          </button>
        </div>
        <div class="np-seek">
          <span id="np-current">0:00</span>
          <input id="np-seekbar" type="range" min="0" max="100" value="0" aria-label="Seek">
          <span id="np-duration">0:00</span>
        </div>
        <div class="np-extra">
          <button id="np-shuffle" class="icon-btn" aria-label="Shuffle">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 3h5v5l-1.8-1.8-3.7 3.7-1.4-1.4 3.7-3.7L16 3zM3 7h4l3 3-1.4 1.4-2.4-2.4H3V7zm18 9v5h-5l1.8-1.8-4.2-4.2 1.4-1.4 4.2 4.2L21 16zM3 17h4l2.7-2.7 1.4 1.4L7.4 19H3v-2z"/></svg>
          </button>
          <button id="np-repeat" class="icon-btn" aria-label="Repeat">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10V4l4 4-4 4V9H7a4 4 0 0 0 0 8h2v2H7a6 6 0 0 1 0-12z"/></svg>
          </button>
          <button id="np-fav" class="icon-btn" aria-label="Favorite">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="heart-icon"><path d="M12 20.5s-7.5-4.35-9.5-8.94C.71 8.1 2.68 5 5.92 5c2 0 3.23 1.08 4.08 2.25C10.85 6.08 12.08 5 14.08 5c3.24 0 5.21 3.1 3.42 6.56C19.5 16.15 12 20.5 12 20.5z"/></svg>
          </button>
          <div class="np-volume">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4zm12.5 3a4.5 4.5 0 0 0-2.2-3.9v7.8a4.5 4.5 0 0 0 2.2-3.9z"/></svg>
            <input id="np-volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
          </div>
        </div>
        <div id="np-lyrics" class="np-lyrics"></div>
        <p class="np-tip">Swipe left or right to change tracks.</p>
      </div>
    </div>

    <div id="sheet-backdrop" class="sheet-backdrop hidden"></div>

    <div id="song-sheet" class="sheet hidden" aria-hidden="true">
      <div class="sheet-header">
        <div class="sheet-title">Song Options</div>
        <button id="sheet-close" class="icon-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div id="sheet-song" class="sheet-song"></div>
      <div class="sheet-actions">
        <button id="sheet-add-playlist" class="sheet-btn">Add to Playlist</button>
        <button id="sheet-like" class="sheet-btn">Like</button>
        <button id="sheet-delete" class="sheet-btn danger">Delete</button>
      </div>
    </div>

    <div id="playlist-sheet" class="sheet hidden" aria-hidden="true">
      <div class="sheet-header">
        <div class="sheet-title">Add to Playlist</div>
        <button id="playlist-sheet-close" class="icon-btn" aria-label="Close">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
      <div class="sheet-actions">
        <button id="playlist-create" class="sheet-btn">New Playlist</button>
      </div>
      <div id="playlist-list" class="playlist-sheet-list"></div>
    </div>

    <div id="playlist-create-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <h3 id="playlist-modal-title">Create Playlist</h3>
        <input id="playlist-name" type="text" placeholder="Playlist name" maxlength="40">
        <div class="modal-actions">
          <button id="playlist-cancel" class="ghost-btn">Cancel</button>
          <button id="playlist-save" class="primary-btn">Create</button>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <div id="iphone-only" class="iphone-only hidden" role="dialog" aria-live="polite">
      <div class="iphone-only-card">
        <div class="section-title">iPhone Only</div>
        <div class="section-subtitle">This player is tuned for your iPhone experience.</div>
        <p>Open it on your iPhone for the best performance and full-screen playback.</p>
      </div>
    </div>
  </div>

  <script>
    window.PULSE_API_BASE = 'http://192.168.29.37:5000';
  </script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
